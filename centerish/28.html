<title>28: floats (CSS war crimes)</title>
<link rel="stylesheet" href="style.css">
<script src="preview.js" defer></script>
<style>
  html, body { height: 100vh; }
  /* a 1px-wide floated spacer that takes 50vh of height. its negative
     margin-bottom is half the centerish height, together they cancel
     so #centerish lands with its CENTER at 50vh. */
  .spacer {
    float: left;
    width: 1px;
    height: 50vh;
    margin-bottom: -90px;       /* = -(centerish_height / 2) */
  }
  #centerish {
    clear: left;
    margin: 0 auto;
    width: 460px;
    height: 180px;              /* hardcoded, the float math needs it */
    box-sizing: border-box;
    background: #faf6e8;
    border: 2.5px solid #1a1a1a;
    text-align: center;
    padding: 16px 22px;
    line-height: 1.4;
  }
</style>

</div>
