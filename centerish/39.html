<!doctype html>
<html lang="en">
<title>39 — Web Worker centering</title>
<link rel="stylesheet" href="style.css">
<script src="preview.js" defer></script>
<style>
  html, body { height: 100vh; }
  #centerish { position: absolute; left: 50%; transform: translateX(-50%);
               border: 2.5px solid #1a1a1a; padding: 16px 22px;
               max-width: 480px; text-align: center; line-height: 1.4;
               background: #faf6e8; }
  .meter { position: fixed; bottom: 8px; right: 12px; font-size: 12px; color: #4a4a4a; }
</style>
<div class="chrome">
  <a class="back" href="index.html#39">← Index</a>
  <button type="button" class="lorem-btn">+ Lorem Ipsum</button>
</div>
<div class="ruler"></div>
<div id="centerish">Threading. For centering. Why? Because we can. The worker is a separate thread doing nothing useful.</div>
<div class="meter">messages from worker: <span id="n">0</span></div>
<script>
  const el = centerish;
  const meter = document.getElementById('n');
  let messages = 0;

  // worker as a blob URL — keeps the file self-contained
  const workerSrc = `setInterval(() => postMessage('tick'), 100);`;
  const blob = new Blob([workerSrc], { type: 'application/javascript' });
  const worker = new Worker(URL.createObjectURL(blob));
  worker.onmessage = () => {
    el.style.top = (innerHeight - el.offsetHeight) / 2 + 'px';
    meter.textContent = ++messages;
  };
</script>
