<!doctype html>
<html lang="en">
<title>44: &lt;button&gt; auto-centers its content</title>
<link rel="stylesheet" href="style.css">
<script src="preview.js" defer></script>
<style>
  html, body { height: 100vh; }
  body { margin: 0; overflow: hidden; }
  /* a <button> sized to the viewport. the user-agent stylesheet centers
     button content both horizontally and vertically by default. no flex,
     no grid, no place-items required, the button does it. */
  #centerish {
    width: 100vw;
    height: 100vh;
    appearance: none;
    -webkit-appearance: none;
    background: none;
    border: none;
    padding: 0;
    color: inherit;
    font: inherit;
    line-height: 1.4;
    cursor: pointer;
  }
  #centerish:focus { outline: none; }
  /* rotate just the inner text so clicking doesn't whip the entire button */
  #text {
    display: inline-block;
    max-width: 480px;
    transition: transform 700ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
</style>
<div class="chrome">
  <a class="back" href="index.html#44">← Index</a>
  <button type="button" id="lorem">+ Lorem Ipsum</button>
</div>
<div class="ruler"></div>
<button type="button" id="centerish">
  <span id="text">A <code>&lt;button&gt;</code> element auto-centers its content, both axes, per the user-agent stylesheet. We just made the button the size of the viewport. Click me, I will spin, for no reason.</span>
</button>
<script>
  let spins = 0;
  centerish.addEventListener('click', () => {
    spins++;
    text.style.transform = `rotate(${spins * 180}deg)`;
  });
</script>
