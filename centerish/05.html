<!doctype html>
<html lang="en">
<title>05: line-height = 100vh (centered when terse)</title>
<link rel="stylesheet" href="style.css">
<script src="preview.js" defer></script>
<style>
  html, body { height: 100vh; }
  body {
    text-align: center;
    line-height: 100vh;          /* works as long as we stay one line */
    width: 20em;
    margin: 0 auto;
  }
  /* keep the chrome buttons their actual size — they'd otherwise inherit
     line-height: 100vh and become catastrophic */
  .back, .lorem-btn { line-height: normal; }
  #centerish {
    border: 2.5px solid #1a1a1a;
    width: 20em;
  }

  .more-below {
    position: fixed;
    bottom: 14px;
    left: 50%;
    font: 14px "Comic Sans MS", "Marker Felt", cursive;
    line-height: normal;
    color: #c0392b;
    background: rgba(250, 246, 232, 0.92);
    border: 1.5px solid #c0392b;
    border-radius: 6px;
    padding: 6px 12px;
    z-index: 9999;
    display: none;
    animation: nudge 1s ease-in-out infinite alternate;
  }
  .more-below.show { display: block; }
  @keyframes nudge {
    from { transform: translate(-50%, 0); }
    to   { transform: translate(-50%, 5px); }
  }
</style>
<div class="chrome">
  <a class="back" href="index.html#05">← Index</a>
  <button type="button" class="lorem-btn">+ Lorem Ipsum</button>
</div>
<div class="ruler"></div>
<span id="centerish">Centered as long as I stay terse</span>
<div class="more-below" id="more">&darr; more text below, each wrapped line is 100vh tall &darr;</div>
<script>
  const hint = document.getElementById('more');
  function check() {
    const overflows = document.documentElement.scrollHeight > innerHeight + 4;
    hint.classList.toggle('show', overflows);
  }
  // body's box is fixed at 100vh, so ResizeObserver on body never fires.
  // Watch for DOM mutations (Lorem button appends a <span>) and window resize.
  new MutationObserver(check).observe(centerish, { childList: true, subtree: true, characterData: true });
  addEventListener('resize', check);
  check();
</script>
