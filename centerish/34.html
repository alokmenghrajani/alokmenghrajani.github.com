               border: 2.5px solid #1a1a1a; padding: 16px 22px;
               max-width: 480px; text-align: center; line-height: 1.4; background: #faf6e8; }

  <button type="button" class="lorem-btn">+ Lorem Ipsum</button>
</div>
<div class="ruler"></div>
<div id="centerish">Re-centered every animation frame. Reads my own height. Writes my <code>top</code>. Forever. Your fan go brrr.</div>
<div class="meter">frames: <span id="n">0</span></div>
<script>
  const el = centerish;
  const n = document.getElementById('n');
  let frames = 0;
  function tick() {
    el.style.top = (innerHeight - el.offsetHeight) / 2 + 'px';
    n.textContent = ++frames;
    requestAnimationFrame(tick);
  }
  tick();
</script>
