<!doctype html>
<html lang="en">
<title>38: WebGL quad</title>
<link rel="stylesheet" href="style.css">
<script src="preview.js" defer></script>
<style>
  html, body { height: 100vh; }
  canvas#centerish { display: block; width: 100vw; height: 100vh; }
</style>
<div class="chrome">
  <a class="back" href="index.html#38">← Index</a>
  <button type="button" id="lorem">+ Lorem Ipsum</button>
</div>
<div class="ruler"></div>
<canvas id="centerish"></canvas>
<script>
  const gl = centerish.getContext('webgl');

  function size() {
    centerish.width = innerWidth * devicePixelRatio;
    centerish.height = innerHeight * devicePixelRatio;
  }
  size();

  // build a text texture
  const tex2d = document.createElement('canvas');
  tex2d.width = 1024; tex2d.height = 128;
  const c = tex2d.getContext('2d');
  c.fillStyle = '#faf6e8'; c.fillRect(0, 0, tex2d.width, tex2d.height);
  c.fillStyle = '#1a1a1a';
  c.font = '32px "Comic Sans MS", "Marker Felt", cursive';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('Compiled a shader. For centering. Send help.', tex2d.width/2, tex2d.height/2);
  c.strokeStyle = '#1a1a1a'; c.lineWidth = 4;
  c.strokeRect(40, 12, tex2d.width - 80, tex2d.height - 24);

  const vs = `attribute vec2 p; attribute vec2 t; varying vec2 vt;
    void main(){ vt = t; gl_Position = vec4(p, 0.0, 1.0); }`;
  const fs = `precision mediump float; varying vec2 vt; uniform sampler2D u;
    void main(){ gl_FragColor = texture2D(u, vt); }`;

  function compile(type, src){ const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog); gl.useProgram(prog);

  // a quad centered at clip-space (0,0), i.e., screen center
  const w = 0.85, h = w * (tex2d.height / tex2d.width) * (innerWidth / innerHeight);
  const verts = new Float32Array([
    -w, -h, 0, 1,
     w, -h, 1, 1,
    -w,  h, 0, 0,
     w,  h, 1, 0,
  ]);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
  const pLoc = gl.getAttribLocation(prog, 'p');
  const tLoc = gl.getAttribLocation(prog, 't');
  gl.enableVertexAttribArray(pLoc);
  gl.enableVertexAttribArray(tLoc);
  gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 16, 0);
  gl.vertexAttribPointer(tLoc, 2, gl.FLOAT, false, 16, 8);

  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tex2d);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  gl.viewport(0, 0, centerish.width, centerish.height);
  gl.clearColor(250/255, 246/255, 232/255, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
</script>
