<style>
  /* the Department of Internet Things forbids CSS post-1999. */
  /* however, our HTML5 doctype refuses to honor <table height="100%"> in
     standards mode, so the table collapses to content height and nothing
     centers. This CSS line is the entire negotiated compromise. */
  html, body { height: 100%; }
  #centerish {
    font-family: "Comic Sans MS", "Marker Felt", cursive;
    line-height: 1.4;
    max-width: 520px;
  }
</style>

</div>

    <td valign="middle" align="center">
      <div id="centerish">
        Compliant with our government's IE5-compatibility mandate. We support exactly one (1) browser. It was released in 1999. We are not allowed to upgrade it. The cake is also from 1999.
      </div>
    </td>
  </tr>
</table>
