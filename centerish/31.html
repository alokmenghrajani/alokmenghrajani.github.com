<script>
  // fifty nested divs, each padding-top: 1vh. cumulative = 50vh. fractal centering.
  let html = '';
  for (let i = 0; i < 50; i++) html += '<div class="lvl">';
  html += '<div id="centerish">Centered through 50 levels of <code>&lt;div&gt;</code> nesting, each adding 1vh of padding.</div>';

  document.body.insertAdjacentHTML('beforeend', html);
</script>
